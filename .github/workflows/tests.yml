name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install flask psycopg2-binary pytest

    - name: Create config.py
      run: |
        echo "HOST = '${{ secrets.DB_HOST }}'" > config.py
        echo "PORT = ${{ secrets.DB_PORT }}" >> config.py
        echo "DBNAME = '${{ secrets.DB_NAME }}'" >> config.py
        echo "USER = '${{ secrets.DB_USER }}'" >> config.py
        echo "PASSWORD = '${{ secrets.DB_PASSWORD }}'" >> config.py

    - name: Run tests
      run: |
        python -m pytest test_app.py -v